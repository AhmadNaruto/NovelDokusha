name: Publish Release

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  buildRelease:
    name: Build Release APK
    runs-on: ubuntu-22.04
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Set up JDK environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: Setup APK signing
        run: |
          # Decode signing key from secrets
          echo -n ${{ secrets.SIGNING_KEY }} | base64 -d > HarzBaiQ.jks

          # Create signing properties
          echo storeFile=HarzBaiQ.jks > custom.properties
          echo storePassword=${{ secrets.KEY_STORE_PASSWORD }} >> custom.properties
          echo keyAlias=${{ secrets.ALIAS }} >> custom.properties
          echo keyPassword=${{ secrets.KEY_PASSWORD }} >> custom.properties
          echo "Signing configuration created successfully"

      - name: Build app
        run: |
          ./gradlew assembleRelease -PlocalPropertiesFilePath=custom.properties --no-daemon 2>&1 | tee build.log

      - name: Upload build log (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log-failure
          path: build.log
          retention-days: 30

      - name: Create APK env info entries, rename APK
        run: |
          python .github/build_scripts/extract_info.py

      - name: Upload build log (on success)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-log-success
          path: build.log
          retention-days: 30

      - name: Upload Release APK
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          name: NovelDokusha v${{ env.APP_VERSION }}
          tag_name: v${{ env.APP_VERSION }}
          generate_release_notes: true
          files: |
            ${{ env.APK_FILE_PATH_foss }}
            ${{ env.APK_FILE_PATH }}
